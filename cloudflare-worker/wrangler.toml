name = "calculatord"
main = "build/worker/index.js"
compatibility_date = "2026-03-27"
workers_dev = true

[build]
command = "worker-build --release"

[vars]
APP_ORIGIN = "https://calculatord.calculatorq.workers.dev"

[assets]
directory = "../static"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]
